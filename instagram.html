<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
</head>

<style>
    * {
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
        }

    ::-webkit-scrollbar { /* Pseudoclasse para esconder as barra laterais*/
        width: 0px;
        height: 0px;
    }

    img {
        width: 100vw;
    }

    a {
        display: block; /* Transforma o link em um bloco para ocupar toda a largura */
        background-color: #E1306C; /* Cor de fundo do Instagram */
        padding: 25px;
        text-decoration: none;
        text-align: center;
        font-weight: bold;
        font-size: 15px;
        color: white;
    }
</style>
<body>
    <img src="imagens/tela-instagram.jpg">
    <a href="http://http://instagram.com/gustavoguanabara/" target="_blank" >Acesse Aqui</a>
</body>
</html>
