<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
</head>
  <style>
    * {
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
    }
    ::-webkit-scrollbar { /* Pseudoclasse para esconder as barra laterais*/
        display: none;
    }
    img {
        width: 100vw;
    }

    a {
        display: block; /* Transforma o link em um bloco para ocupar toda a largura */
        padding: 25px;
        background-color: #3b5998; /* Cor de fundo do Facebook */
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        font-size: 15px;
        color: white;
    }
</style>
<body>
    <img src="imagens/tela-facebook.jpg">
    <a href="https://www.facebook.com/gustavoguanabara/?locale=pt_BR">Acesse Aqui</a>
</body>
</html>
